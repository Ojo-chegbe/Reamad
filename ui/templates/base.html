<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Soloa Reddit Review Console</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark"></div>
        <div>
          <h1>Soloa Reddit Review Console</h1>
          <p>Human approval required before posting</p>
        </div>
      </div>
      <nav>
        <a href="{{ url_for('dashboard') }}">Inbox</a>
        <a href="{{ url_for('playbooks') }}">Playbooks</a>
        <a href="{{ url_for('audit') }}">Audit</a>
      </nav>
    </header>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
