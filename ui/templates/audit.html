{% extends "base.html" %}
{% block content %}
<section class="panel">
  <h2>Audit Trail</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Opportunity</th>
        <th>Action</th>
        <th>Actor</th>
        <th>Note</th>
        <th>Timestamp</th>
      </tr>
    </thead>
    <tbody>
      {% for row in logs %}
      <tr>
        <td>{{ row.id }}</td>
        <td><a href="{{ url_for('opportunity_detail', opportunity_id=row.opportunity_id) }}">{{ row.opportunity_id }}</a></td>
        <td><span class="pill {{ row.action }}">{{ row.action }}</span></td>
        <td>{{ row.actor }}</td>
        <td>{{ row.note }}</td>
        <td>{{ row.created_at }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
