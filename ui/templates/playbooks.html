{% extends "base.html" %}
{% block content %}
<section class="panel">
  <h2>Subreddit Playbooks</h2>
  <table>
    <thead>
      <tr>
        <th>Subreddit</th>
        <th>Rules Summary</th>
        <th>Operator Notes</th>
        <th>Updated</th>
      </tr>
    </thead>
    <tbody>
      {% for row in playbooks %}
      <tr>
        <td>r/{{ row.subreddit }}</td>
        <td>{{ row.rules_text }}</td>
        <td>{{ row.notes }}</td>
        <td>{{ row.updated_at }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
